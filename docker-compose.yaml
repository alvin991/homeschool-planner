services:
  db:
    image: mongo:7
    container_name: homeschool-planner-mongo
    restart: always
    environment:
      MONGO_INITDB_DATABASE: homeschool_planner
      MONGO_INITDB_ROOT_USERNAME: homeschool_user
      MONGO_INITDB_ROOT_PASSWORD: homeschool_password
    ports:
      - "27017:27017"
    volumes:
      - db_data:/data/db

  dev:
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile
    container_name: homeschool-planner-app-dev
    volumes:
      - .:/workspace:cached
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
    depends_on:
      - db

volumes:
  db_data: