name: Test self-hosted runner

# Push trigger disabled so this does not run on every commit to main. Run manually from Actions when needed.
# To turn smoke tests on every push again, add:  push:  branches: [main]
on:
  workflow_dispatch:

jobs:
  hello:
    runs-on: self-hosted
    steps:
      - name: Show user
        run: whoami

      - name: Docker version
        run: docker version
