# Build and deploy on your Windows self-hosted runner (same machine as Docker Desktop).
# Requires repo variable: DEPLOY_ENV_FILE = absolute path to production .env on that machine.
#
# Trigger: manual only (Actions tab -> Deploy -> Run workflow). That avoids a full Docker
# build/deploy on every push to main while you stack commits for one feature.
#
# Other options you can add under `on:` later:
#   push: branches: [main]     — deploy every push (noisy during WIP)
#   push: tags: ['v*']         — deploy when you tag a release
#   push: paths: ['src/**']    — deploy only when certain paths change

name: Deploy (self-hosted)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Ensure Docker network exists
        shell: powershell
        run: |
          docker network inspect homeschool-net 2>$null | Out-Null
          if ($LASTEXITCODE -ne 0) {
            docker network create homeschool-net
          }

      # Same fixed name as docker-compose.prod.yaml; remove leftover from manual `docker run` or old deploys.
      - name: Remove previous app container (if any)
        shell: powershell
        run: |
          docker rm -f homeschool-app 2>$null | Out-Null
          exit 0

      - name: Build and deploy with Compose (prod)
        shell: powershell
        env:
          DEPLOY_ENV_FILE: ${{ vars.DEPLOY_ENV_FILE }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:DEPLOY_ENV_FILE)) {
            Write-Error "Set repository variable DEPLOY_ENV_FILE to your production .env absolute path on this runner (e.g. C:/Users/you/homeschool.env). GitHub: Settings -> Secrets and variables -> Actions -> Variables."
            exit 1
          }
          if (-not (Test-Path -LiteralPath $env:DEPLOY_ENV_FILE)) {
            Write-Error "DEPLOY_ENV_FILE path does not exist: $($env:DEPLOY_ENV_FILE)"
            exit 1
          }
          docker compose -f docker-compose.prod.yaml up -d --build
