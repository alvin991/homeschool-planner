# Production: Next.js app only. MongoDB runs separately (e.g. container name `homeschool-mongo` on `homeschool-net`).
#
# How env_file works:
# - The path is resolved when you run `docker compose` (relative to this compose file, unless absolute).
# - ${DEPLOY_ENV_FILE:-.env} is substituted from the **host shell environment** (GitHub Actions sets DEPLOY_ENV_FILE).
# - Compose reads that file and injects its KEY=value pairs as **environment variables inside the app container**.
#   It does NOT bake them into the Docker image build; the image is built separately, then the container starts with this env.
#
# Requirements:
# - Network `homeschool-net` must exist, and your Mongo container must be attached to it (e.g. `homeschool-mongo`).
# - production.env (or whatever DEPLOY_ENV_FILE points to) must set MONGODB_URI using that hostname, e.g.:
#     mongodb://user:pass@homeschool-mongo:27017/homeschool_planner?authSource=admin
#
# Deploy manually on the host:
#   set DEPLOY_ENV_FILE=C:/path/to/production.env
#   docker compose -f docker-compose.prod.yaml up -d --build

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: homeschool-planner:local
    container_name: homeschool-app
    restart: unless-stopped
    networks:
      - homeschool-net
    ports:
      - "3002:3000"
    env_file:
      - ${DEPLOY_ENV_FILE:-.env}

networks:
  homeschool-net:
    external: true
